#Yet Another Markup Language lol
# 部署多个容器 且对容器的顺序有一定要求.
# 完成一整套服务的部署

version: '3.8'

services: # 服务
  # 1. Redis: broadcast among servers
  redis:
    image: redis:latest
    container_name: danmaku_redis
    ports:
      - "6379:6379"
    restart: always

  # 1. MySQL: consistent storage for danmaku
  mysql: # 服务名
    image: mysql:8.0 # 使用镜像
    container_name: danmaku_mysql # 启动后的容器名
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root  
      MYSQL_DATABASE: danmaku_db  
    #Authentication plugin 'caching_sha2_password' cannot be loaded
    command: --default-authentication-plugin=mysql_native_password
    restart: always

  # 3. Kafka
  kafka:
    image: wurstmeister/kafka
    container_name: danmaku_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper